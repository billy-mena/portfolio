<div class="tt" id="tt"></div>

<script>
function tip(e, msg) {
  const t = document.getElementById('tt');
  t.textContent = msg;
  t.style.display = 'block';
  const pad = 12;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  t.style.left = x + 'px';
  t.style.top = y + 'px';
  // reposition if off-screen
  const r = t.getBoundingClientRect();
  if (r.right > window.innerWidth - 10) t.style.left = (e.clientX - r.width - pad) + 'px';
  if (r.bottom > window.innerHeight - 10) t.style.top = (e.clientY - r.height - pad) + 'px';
  clearTimeout(tip._timer);
  tip._timer = setTimeout(() => t.style.display = 'none', 5000);
}
document.addEventListener('click', e => {
  if (!e.target.closest('.node')) document.getElementById('tt').style.display = 'none';
});
</script>
</body>
